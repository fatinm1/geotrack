# GeoTrack MVP - Docker Compose for local development
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://geotrack:geotrack@postgres:5432/geotrack
      - REDIS_URL=redis://redis:6379/0
      - OPENSKY_USERNAME=${OPENSKY_USERNAME:-}
      - OPENSKY_PASSWORD=${OPENSKY_PASSWORD:-}
      - OPENSKY_POLL_SECONDS=${OPENSKY_POLL_SECONDS:-5}
      - MDCHART_FEED_URL=${MDCHART_FEED_URL:-}
      - DETECTIONS_ENABLED=${DETECTIONS_ENABLED:-false}
      - DETECTION_INTERVAL_SECONDS=${DETECTION_INTERVAL_SECONDS:-20}
      - USE_MOCK_OPENSKY=${USE_MOCK_OPENSKY:-false}
      - USE_MOCK_DETECTOR=${USE_MOCK_DETECTOR:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://geotrack:geotrack@postgres:5432/geotrack
      - REDIS_URL=redis://redis:6379/0
      - DETECTIONS_ENABLED=${DETECTIONS_ENABLED:-false}
      - DETECTION_INTERVAL_SECONDS=${DETECTION_INTERVAL_SECONDS:-20}
      - USE_MOCK_DETECTOR=${USE_MOCK_DETECTOR:-true}
      - MDCHART_FEED_URL=${MDCHART_FEED_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: python -m app.workers.rq_worker

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=geotrack
      - POSTGRES_PASSWORD=geotrack
      - POSTGRES_DB=geotrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geotrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_next:/app/.next
    command: npm run dev

volumes:
  redis_data:
  postgres_data:
  frontend_next:
